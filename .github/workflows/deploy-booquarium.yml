name: Deploy booquarium to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "projects/booquarium/**"
      - "ui-kit/**"
      - ".github/workflows/deploy-booquarium.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/booquarium/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: projects/booquarium

      - name: Build
        run: npm run build
        working-directory: projects/booquarium
        env:
          NODE_ENV: production

      - name: Add .nojekyll
        run: touch projects/booquarium/out/.nojekyll

      - name: Deploy to halinskiy/booquarium
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.BOOQUARIUM_DEPLOY_KEY }}
          external_repository: halinskiy/booquarium
          publish_branch: gh-pages
          publish_dir: ./projects/booquarium/out
          force_orphan: true
